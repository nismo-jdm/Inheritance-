<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nadia 2026-27 Print Cash Management</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#f5f6fa;
    padding:20px;
}

.container{
    max-width:1400px;
    margin:auto;
}

h1{
    margin-bottom:20px;
    color:#333;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card h3{
    color:#666;
    margin-bottom:10px;
}

.card h2{
    color:#6a1b9a;
}

.form-section{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

input,select{
    padding:10px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    background:#6a1b9a;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.actions{
    margin:15px 0;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.table-container{
    background:white;
    border-radius:10px;
    overflow:auto;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#6a1b9a;
    color:white;
}

th,td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #eee;
}

tr:hover{
    background:#fafafa;
}

.paid{
    color:green;
    font-weight:bold;
}

.pending{
    color:red;
    font-weight:bold;
}

.delete-btn{
    background:#dc3545;
}

.search-box{
    width:300px;
    max-width:100%;
}
</style>
</head>
<body>

<div class="container">

<h1>Nadia 2026-27 Print Cash Management</h1>

<div class="dashboard">
    <div class="card">
        <h3>Total Revenue</h3>
        <h2 id="revenue">₹0</h2>
    </div>

    <div class="card">
        <h3>Total Paid</h3>
        <h2 id="paid">₹0</h2>
    </div>

    <div class="card">
        <h3>Total Pending</h3>
        <h2 id="pending">₹0</h2>
    </div>
</div>

<div class="form-section">

<h3>Add Print Order</h3><br>

<div class="form-grid">

<input type="date" id="date">

<input type="text" id="customer" placeholder="Customer Name">

<input type="text" id="details" placeholder="Printing Details">

<input type="number" id="copies" placeholder="Copies/Pages">

<input type="number" id="price" placeholder="Unit Price">

<select id="status">
    <option value="Paid">Paid</option>
    <option value="Pending">Pending</option>
</select>

<button onclick="addRecord()">Add Order</button>

</div>
</div>

<div class="actions">
    <input type="text" id="search" class="search-box" placeholder="Search Customer..." onkeyup="renderTable()">
    <button onclick="exportCSV()">Export CSV</button>
    <button onclick="window.print()">Print Report</button>
</div>

<div class="table-container">

<table>

<thead>
<tr>
<th>Date</th>
<th>Customer Name</th>
<th>Printing Details</th>
<th>Copies/Pages</th>
<th>Unit Price (₹)</th>
<th>Total Amount (₹)</th>
<th>Payment Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script>

let records = JSON.parse(localStorage.getItem('printRecords')) || [];

function saveData(){
    localStorage.setItem('printRecords',JSON.stringify(records));
}

function addRecord(){

    const date=document.getElementById('date').value;
    const customer=document.getElementById('customer').value;
    const details=document.getElementById('details').value;
    const copies=parseInt(document.getElementById('copies').value);
    const price=parseFloat(document.getElementById('price').value);
    const status=document.getElementById('status').value;

    if(!date || !customer || !details || !copies || !price){
        alert("Please fill all fields");
        return;
    }

    const total=copies*price;

    records.push({
        date,
        customer,
        details,
        copies,
        price,
        total,
        status
    });

    saveData();
    renderTable();

    document.getElementById('customer').value='';
    document.getElementById('details').value='';
    document.getElementById('copies').value='';
    document.getElementById('price').value='';
}

function renderTable(){

    let html='';

    let revenue=0;
    let paid=0;
    let pending=0;

    const search=document.getElementById('search').value.toLowerCase();

    records.forEach((r,index)=>{

        if(
            !r.customer.toLowerCase().includes(search) &&
            !r.details.toLowerCase().includes(search)
        ){
            return;
        }

        revenue+=r.total;

        if(r.status==='Paid'){
            paid+=r.total;
        }else{
            pending+=r.total;
        }

        html+=`
        <tr>
            <td>${r.date}</td>
            <td>${r.customer}</td>
            <td>${r.details}</td>
            <td>${r.copies}</td>
            <td>${r.price}</td>
            <td>${r.total}</td>
            <td class="${r.status==='Paid'?'paid':'pending'}">
                ${r.status}
            </td>
            <td>
                <button class="delete-btn"
                onclick="deleteRecord(${index})">
                Delete
                </button>
            </td>
        </tr>
        `;
    });

    document.getElementById('tableBody').innerHTML=html;

    document.getElementById('revenue').innerText='₹'+revenue;
    document.getElementById('paid').innerText='₹'+paid;
    document.getElementById('pending').innerText='₹'+pending;
}

function deleteRecord(index){

    if(confirm('Delete this record?')){
        records.splice(index,1);
        saveData();
        renderTable();
    }

}

function exportCSV(){

    let csv =
    "Date,Customer,Printing Details,Copies,Unit Price,Total,Status\n";

    records.forEach(r=>{
        csv +=
        `${r.date},${r.customer},${r.details},${r.copies},${r.price},${r.total},${r.status}\n`;
    });

    const blob=new Blob([csv],{type:'text/csv'});
    const url=window.URL.createObjectURL(blob);

    const a=document.createElement('a');
    a.href=url;
    a.download='PrintShopReport.csv';
    a.click();
}

renderTable();

</script>

</body>
</html>
