<!DOCTYPE html>
<html>
<head>
    <title>Union Print Cash Management</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        body{
            font-family:Arial,sans-serif;
            background:#f4f4f4;
            margin:20px;
        }

        h2{
            text-align:center;
        }

        .dashboard{
            display:flex;
            gap:15px;
            margin-bottom:20px;
        }

        .card{
            flex:1;
            background:white;
            padding:15px;
            border-radius:8px;
            text-align:center;
            box-shadow:0 2px 5px rgba(0,0,0,.1);
        }

        input,select,button{
            padding:10px;
            margin:5px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th{
            background:#5e3b8c;
            color:white;
            padding:10px;
        }

        td{
            padding:8px;
            border:1px solid #ddd;
        }

        .paid{
            color:green;
            font-weight:bold;
        }

        .pending{
            color:red;
            font-weight:bold;
        }

        .form{
            background:white;
            padding:15px;
            margin-bottom:20px;
        }
    </style>
</head>
<body>

<h2>Union Print Cash Management</h2>

<div class="dashboard">
    <div class="card">
        <h3>Paid Amount</h3>
        ₹<span id="paidTotal">0</span>
    </div>

    <div class="card">
        <h3>Pending Amount</h3>
        ₹<span id="pendingTotal">0</span>
    </div>

    <div class="card">
        <h3>Balance</h3>
        ₹<span id="balance">0</span>
    </div>
</div>

<div class="form">

    <input type="date" id="date">

    <input type="text" id="customer"
           placeholder="Customer Name">

    <input type="text" id="details"
           placeholder="Printing Details">

    <input type="number" id="copies"
           placeholder="Copies/Pages">

    <input type="number" id="price"
           placeholder="Unit Price">

    <select id="status">
        <option>Paid</option>
        <option>Pending</option>
    </select>

    <button onclick="addOrder()">Add Order</button>
    <button onclick="generatePDF()">Export PDF</button>

</div>

<table id="orderTable">
    <thead>
        <tr>
            <th>Date</th>
            <th>Customer Name</th>
            <th>Printing Details</th>
            <th>Copies</th>
            <th>Unit Price</th>
            <th>Total Amount</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>

let orders = JSON.parse(localStorage.getItem("orders")) || [];

function saveData(){
    localStorage.setItem("orders",
    JSON.stringify(orders));
}

function addOrder(){

    let date=document.getElementById("date").value;
    let customer=document.getElementById("customer").value;
    let details=document.getElementById("details").value;
    let copies=Number(document.getElementById("copies").value);
    let price=Number(document.getElementById("price").value);
    let status=document.getElementById("status").value;

    let total=copies*price;

    orders.push({
        date,
        customer,
        details,
        copies,
        price,
        total,
        status
    });

    saveData();
    displayOrders();
}

function displayOrders(){

    let tbody=document.querySelector("#orderTable tbody");
    tbody.innerHTML="";

    let paid=0;
    let pending=0;

    orders.forEach((o,index)=>{

        if(o.status==="Paid"){
            paid+=o.total;
        }else{
            pending+=o.total;
        }

        tbody.innerHTML+=`
        <tr>
            <td>${o.date}</td>
            <td>${o.customer}</td>
            <td>${o.details}</td>
            <td>${o.copies}</td>
            <td>₹${o.price}</td>
            <td>₹${o.total}</td>

            <td class="${o.status==='Paid'
            ?'paid':'pending'}">
            ${o.status}
            </td>

            <td>
                <button onclick="toggleStatus(${index})">
                    Edit Status
                </button>

                <button onclick="deleteOrder(${index})">
                    Delete
                </button>
            </td>
        </tr>`;
    });

    document.getElementById("paidTotal").innerText=paid;
    document.getElementById("pendingTotal").innerText=pending;
    document.getElementById("balance").innerText=paid;
}

function toggleStatus(index){

    orders[index].status=
    orders[index].status==="Paid"
    ?"Pending":"Paid";

    saveData();
    displayOrders();
}

function deleteOrder(index){

    orders.splice(index,1);

    saveData();
    displayOrders();
}

function generatePDF(){

    const {jsPDF}=window.jspdf;

    const doc=new jsPDF();

    doc.text(
      "Union Print Cash Report",
      14,
      15
    );

    let rows=orders.map(o=>[
        o.date,
        o.customer,
        o.details,
        o.copies,
        o.price,
        o.total,
        o.status
    ]);

    doc.autoTable({
        head:[[
            "Date",
            "Customer",
            "Details",
            "Copies",
            "Unit Price",
            "Total",
            "Status"
        ]],
        body:rows,
        startY:25
    });

    doc.save("Union_Print_Report.pdf");
}

displayOrders();

</script>

</body>
</html>
